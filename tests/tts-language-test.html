<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TTS Language Test - All Languages</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
      }

      .header {
        background: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        margin-bottom: 30px;
      }

      .header h1 {
        color: #333;
        margin-bottom: 10px;
      }

      .header p {
        color: #666;
        font-size: 16px;
      }

      .status-bar {
        background: white;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        margin-bottom: 30px;
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
      }

      .status-item {
        flex: 1;
        min-width: 200px;
        padding: 15px;
        background: #f8f9fa;
        border-radius: 10px;
      }

      .status-item label {
        display: block;
        font-size: 12px;
        color: #666;
        margin-bottom: 5px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .status-item .value {
        font-size: 24px;
        font-weight: bold;
        color: #333;
      }

      .status-item.online .value {
        color: #22c55e;
      }

      .status-item.offline .value {
        color: #ef4444;
      }

      .test-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }

      .language-card {
        background: white;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s;
      }

      .language-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
      }

      .language-header {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 20px;
        padding-bottom: 20px;
        border-bottom: 2px solid #f0f0f0;
      }

      .language-flag {
        font-size: 48px;
      }

      .language-info h2 {
        color: #333;
        font-size: 24px;
        margin-bottom: 5px;
      }

      .language-info .native-name {
        color: #666;
        font-size: 18px;
      }

      .test-controls {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .input-group {
        display: flex;
        gap: 10px;
      }

      .input-group input {
        flex: 1;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-size: 16px;
        transition: border-color 0.3s;
      }

      .input-group input:focus {
        outline: none;
        border-color: #667eea;
      }

      .test-button {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s;
      }

      .test-button:hover:not(:disabled) {
        transform: scale(1.02);
        box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
      }

      .test-button:disabled {
        background: linear-gradient(135deg, #94a3b8 0%, #94a3b8 100%);
        cursor: not-allowed;
        opacity: 0.6;
      }

      .test-button:active:not(:disabled) {
        transform: scale(0.98);
      }

      .voice-info {
        margin-top: 15px;
        padding: 15px;
        background: #f8f9fa;
        border-radius: 10px;
        font-size: 13px;
      }

      .voice-info .label {
        color: #666;
        font-weight: 600;
        margin-bottom: 5px;
      }

      .voice-info .detail {
        color: #333;
        margin-bottom: 8px;
        word-break: break-all;
      }

      .test-result {
        margin-top: 15px;
        padding: 12px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        text-align: center;
      }

      .test-result.success {
        background: #dcfce7;
        color: #15803d;
      }

      .test-result.error {
        background: #fee2e2;
        color: #991b1b;
      }

      .test-result.testing {
        background: #dbeafe;
        color: #1e40af;
      }

      .log-panel {
        background: white;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

      .log-panel h2 {
        color: #333;
        margin-bottom: 20px;
      }

      .log-content {
        background: #1e293b;
        color: #94a3b8;
        padding: 20px;
        border-radius: 10px;
        max-height: 400px;
        overflow-y: auto;
        font-family: "Courier New", monospace;
        font-size: 13px;
        line-height: 1.6;
      }

      .log-entry {
        margin-bottom: 10px;
        padding: 8px;
        border-left: 3px solid #475569;
        padding-left: 12px;
      }

      .log-entry.success {
        border-left-color: #22c55e;
        color: #86efac;
      }

      .log-entry.error {
        border-left-color: #ef4444;
        color: #fca5a5;
      }

      .log-entry.info {
        border-left-color: #3b82f6;
        color: #93c5fd;
      }

      .log-entry .timestamp {
        color: #64748b;
        font-size: 11px;
        margin-right: 10px;
      }

      .controls-bar {
        display: flex;
        gap: 10px;
        margin-top: 15px;
      }

      .controls-bar button {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
      }

      .clear-log {
        background: #ef4444;
        color: white;
      }

      .clear-log:hover {
        background: #dc2626;
      }

      .test-all {
        background: #22c55e;
        color: white;
        flex: 1;
      }

      .test-all:hover {
        background: #16a34a;
      }

      @media (max-width: 768px) {
        .test-grid {
          grid-template-columns: 1fr;
        }

        .status-bar {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🔊 TTS Language Test Suite</h1>
        <p>
          Comprehensive testing for all supported languages using Web Speech API
          (Browser TTS)
        </p>
      </div>

      <div class="status-bar">
        <div class="status-item" id="statusConnection">
          <label>Connection Status</label>
          <div class="value">⏳ Checking...</div>
        </div>
        <div class="status-item">
          <label>Total Languages</label>
          <div class="value">4</div>
        </div>
        <div class="status-item">
          <label>Tests Passed</label>
          <div class="value" id="passedCount">0</div>
        </div>
        <div class="status-item">
          <label>Tests Failed</label>
          <div class="value" id="failedCount">0</div>
        </div>
      </div>

      <div class="test-grid" id="languageGrid"></div>

      <div class="log-panel">
        <h2>📋 Test Logs</h2>
        <div class="log-content" id="logContent">
          <div class="log-entry info">
            <span class="timestamp">[00:00:00]</span>
            System initialized. Ready to test.
          </div>
        </div>
        <div class="controls-bar">
          <button class="clear-log" onclick="clearLogs()">Clear Logs</button>
          <button class="test-all" onclick="testAllLanguages()">
            🧪 Test All Languages
          </button>
        </div>
      </div>
    </div>

    <script type="module">
      // Using Web Speech API for better browser compatibility
      // Note: Edge TTS library has connection issues, using native browser TTS instead

      let useEdgeTTS = false; // Disabled due to library issues
      const synth = window.speechSynthesis;
      let voices = [];

      // Load voices for Web Speech API
      function loadBrowserVoices() {
        voices = synth.getVoices();
        if (voices.length > 0) {
          console.log(`[TTS] Loaded ${voices.length} browser voices`);
        }
        return voices;
      }

      if (synth) {
        loadBrowserVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) {
          speechSynthesis.onvoiceschanged = loadBrowserVoices;
        }
      }

      // Helper function to find best voice for language
      function findVoice(langCode) {
        // Try to find exact match
        let voice = voices.find((v) => v.lang === langCode);
        if (voice) return voice;

        // Try to find language prefix match
        const langPrefix = langCode.split("-")[0];
        voice = voices.find((v) => v.lang.startsWith(langPrefix));
        if (voice) return voice;

        // Return first available voice
        return voices[0] || null;
      }

      // Web Speech API TTS function
      async function speakWithWebAPI(text, langCode, rate = 1.0) {
        return new Promise((resolve, reject) => {
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = langCode;
          utterance.rate = rate;
          utterance.pitch = 1.0;
          utterance.volume = 1.0;

          const voice = findVoice(langCode);
          if (voice) {
            utterance.voice = voice;
            console.log(`[TTS] Using voice: ${voice.name} (${voice.lang})`);
          } else {
            console.warn(`[TTS] No voice found for ${langCode}, using default`);
          }

          utterance.onend = () => resolve();
          utterance.onerror = (event) =>
            reject(new Error(event.error || "Speech synthesis error"));

          synth.cancel(); // Cancel any ongoing speech
          synth.speak(utterance);
        });
      }

      const languageTestData = {
        en: {
          name: "English",
          nativeName: "English",
          flag: "🇬🇧",
          voice: "en-US-JennyNeural",
          lang: "en-US",
          rate: "+0%",
          testToken: "A123",
          testCounter: "5",
          labels: {
            token: "Token Number",
            counter: "Counter Number",
          },
          formatText: (token, counter, labels) => {
            return `${labels.token} ${token}. ${labels.counter} ${counter}.`;
          },
        },
        bn: {
          name: "Bangla",
          nativeName: "বাংলা",
          flag: "🇧🇩",
          voice: "bn-BD-NabanitaNeural",
          lang: "bn-BD",
          rate: "-10%",
          testToken: "এ ১২৩",
          testCounter: "৫",
          labels: {
            token: "টোকেন নম্বর",
            counter: "কাউন্টার নম্বর",
          },
          formatText: (token, counter, labels) => {
            const formattedToken = token.toString().split("").join(" ");
            const formattedCounter = counter.toString().split("").join(" ");
            return `${labels.token} ${formattedToken}। ${labels.counter} ${formattedCounter}।`;
          },
        },
        fr: {
          name: "French",
          nativeName: "Français",
          flag: "🇫🇷",
          voice: "fr-FR-DeniseNeural",
          lang: "fr-FR",
          rate: "+0%",
          testToken: "A123",
          testCounter: "5",
          labels: {
            token: "Numéro de jeton",
            counter: "Numéro de comptoir",
          },
          formatText: (token, counter, labels) => {
            return `${labels.token} ${token}. ${labels.counter} ${counter}.`;
          },
        },
        ja: {
          name: "Japanese",
          nativeName: "日本語",
          flag: "🇯🇵",
          voice: "ja-JP-NanamiNeural",
          lang: "ja-JP",
          rate: "+0%",
          testToken: "A123",
          testCounter: "5",
          labels: {
            token: "トークン番号",
            counter: "カウンター番号",
          },
          formatText: (token, counter, labels) => {
            return `${labels.token}「${token}」。${labels.counter}「${counter}」。`;
          },
        },
      };

      let testsPassed = 0;
      let testsFailed = 0;
      let isInitialized = false;

      function getTimestamp() {
        const now = new Date();
        return now.toTimeString().split(" ")[0];
      }

      function addLog(message, type = "info") {
        const logContent = document.getElementById("logContent");
        const entry = document.createElement("div");
        entry.className = `log-entry ${type}`;
        entry.innerHTML = `<span class="timestamp">[${getTimestamp()}]</span>${message}`;
        logContent.appendChild(entry);
        logContent.scrollTop = logContent.scrollHeight;
      }

      function clearLogs() {
        const logContent = document.getElementById("logContent");
        logContent.innerHTML = `
          <div class="log-entry info">
            <span class="timestamp">[${getTimestamp()}]</span>
            Logs cleared.
          </div>
        `;
      }

      function updateStatus(connected) {
        const statusEl = document.getElementById("statusConnection");
        if (connected) {
          statusEl.className = "status-item online";
          statusEl.querySelector(".value").textContent = "✓ Online";
        } else {
          statusEl.className = "status-item offline";
          statusEl.querySelector(".value").textContent = "✗ Offline";
        }
      }

      function updateTestCounts() {
        document.getElementById("passedCount").textContent = testsPassed;
        document.getElementById("failedCount").textContent = testsFailed;
      }

      function createLanguageCard(langCode, config) {
        return `
          <div class="language-card" id="card-${langCode}">
            <div class="language-header">
              <div class="language-flag">${config.flag}</div>
              <div class="language-info">
                <h2>${config.name}</h2>
                <div class="native-name">${config.nativeName}</div>
              </div>
            </div>
            
            <div class="test-controls">
              <div class="input-group">
                <input 
                  type="text" 
                  id="token-${langCode}" 
                  placeholder="Token" 
                  value="${config.testToken}"
                />
                <input 
                  type="text" 
                  id="counter-${langCode}" 
                  placeholder="Counter" 
                  value="${config.testCounter}"
                />
              </div>
              
              <button 
                class="test-button" 
                id="btn-${langCode}"
                onclick="testLanguage('${langCode}')"
              >
                🎤 Test ${config.name}
              </button>
            </div>
            
            <div class="voice-info">
              <div class="label">Voice Engine:</div>
              <div class="detail">${config.voice}</div>
              <div class="label">Language Code:</div>
              <div class="detail">${config.lang}</div>
              <div class="label">Speech Rate:</div>
              <div class="detail">${config.rate}</div>
            </div>
            
            <div class="test-result" id="result-${langCode}" style="display: none;"></div>
          </div>
        `;
      }

      function showResult(langCode, success, message) {
        const resultEl = document.getElementById(`result-${langCode}`);
        resultEl.style.display = "block";
        resultEl.className = `test-result ${success ? "success" : "error"}`;
        resultEl.textContent = success ? `✓ ${message}` : `✗ ${message}`;

        if (success) {
          testsPassed++;
          addLog(`✓ ${languageTestData[langCode].name} test passed`, "success");
        } else {
          testsFailed++;
          addLog(
            `✗ ${languageTestData[langCode].name} test failed: ${message}`,
            "error",
          );
        }
        updateTestCounts();
      }

      window.testLanguage = async function (langCode) {
        const config = languageTestData[langCode];
        const button = document.getElementById(`btn-${langCode}`);
        const resultEl = document.getElementById(`result-${langCode}`);

        try {
          // Show testing state
          button.disabled = true;
          button.textContent = `⏳ Testing...`;
          resultEl.style.display = "block";
          resultEl.className = "test-result testing";
          resultEl.textContent = "🔄 Generating speech...";

          addLog(`Testing ${config.name} (${config.voice})...`, "info");

          // Get input values
          const token = document.getElementById(`token-${langCode}`).value;
          const counter = document.getElementById(`counter-${langCode}`).value;

          // Format text
          const text = config.formatText(token, counter, config.labels);
          addLog(`Text: "${text}"`, "info");

          // Convert rate percentage to decimal
          const rateValue =
            config.rate === "+0%"
              ? 1.0
              : config.rate === "-10%"
                ? 0.9
                : parseFloat(config.rate.replace("%", "")) / 100 + 1;

          // Use Web Speech API
          addLog(`Using Web Speech API with lang: ${config.lang}`, "info");
          const startTime = Date.now();
          await speakWithWebAPI(text, config.lang, rateValue);
          const duration = ((Date.now() - startTime) / 1000).toFixed(2);

          showResult(langCode, true, `Completed in ${duration}s`);
        } catch (error) {
          showResult(langCode, false, error.message);
          addLog(`Error details: ${error.stack}`, "error");
        } finally {
          button.disabled = false;
          button.textContent = `🎤 Test ${config.name}`;
        }
      };

      window.testAllLanguages = async function () {
        addLog("Starting sequential test of all languages...", "info");
        const languages = Object.keys(languageTestData);

        for (const langCode of languages) {
          await testLanguage(langCode);
          // Add small delay between tests
          await new Promise((resolve) => setTimeout(resolve, 1000));
        }

        addLog(
          `All tests completed. Passed: ${testsPassed}, Failed: ${testsFailed}`,
          "info",
        );
      };

      // Initialize on page load
      window.addEventListener("DOMContentLoaded", async () => {
        addLog("Initializing TTS Test Suite...", "info");

        // Render language cards
        const grid = document.getElementById("languageGrid");
        grid.innerHTML = Object.entries(languageTestData)
          .map(([code, config]) => createLanguageCard(code, config))
          .join("");

        addLog("Language cards rendered", "success");

        // Test Web Speech API availability
        try {
          addLog("Testing Web Speech API...", "info");

          // Wait for voices to load
          await new Promise((resolve) => setTimeout(resolve, 200));
          loadBrowserVoices();

          if (synth && voices.length > 0) {
            updateStatus(true);
            addLog(
              `✓ Web Speech API available (${voices.length} voices loaded)`,
              "success",
            );
            addLog(
              "All systems ready. You can now test individual languages or run all tests.",
              "success",
            );
            isInitialized = true;
          } else if (synth) {
            updateStatus(true);
            addLog(
              "✓ Web Speech API available (voices still loading...)",
              "success",
            );
            addLog(
              "System ready. Voices may load during first use.",
              "success",
            );
            isInitialized = true;
          } else {
            updateStatus(false);
            addLog("✗ Web Speech API not supported in this browser", "error");
            addLog(
              "Please use Chrome, Edge, Firefox, or Safari for TTS support.",
              "error",
            );
          }
        } catch (error) {
          updateStatus(false);
          addLog(`✗ Initialization failed: ${error.message}`, "error");
          addLog(
            "Please use a modern browser that supports Web Speech API.",
            "error",
          );
        }
      });
    </script>
  </body>
</html>
